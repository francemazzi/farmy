# ============================================
# Farmy - Docker Compose
#
# Usage:
#   docker compose up -d                              → solo locale (LAN)
#   docker compose --profile tunnel-quick up -d       → con URL casuale trycloudflare.com
#   docker compose --profile tunnel-named up -d       → con tunnel Cloudflare configurato
# ============================================
services:

  # --- Backend API ---
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: farmy-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      - HOST=0.0.0.0
      - PORT=7771
      - DATABASE_URL=file:/app/data/farmy.db
    volumes:
      - farmy-data:/app/data
      - farmy-uploads:/app/uploads
    ports:
      - "7771:7771"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7771/api/auth/me", "||", "exit", "0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Frontend (nginx) ---
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: farmy-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

  # --- Cloudflare Quick Tunnel (URL casuale, zero config) ---
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    container_name: farmy-tunnel-quick
    restart: unless-stopped
    command: tunnel --url http://frontend:80
    profiles:
      - tunnel-quick
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64M

  # --- Cloudflare Named Tunnel (dominio stabile, richiede account) ---
  cloudflared-named:
    image: cloudflare/cloudflared:latest
    container_name: farmy-tunnel-named
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel-named
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64M

  # --- Backup cron ---
  backup:
    image: alpine:latest
    container_name: farmy-backup
    restart: unless-stopped
    volumes:
      - farmy-data:/data:ro
      - farmy-uploads:/uploads:ro
      - farmy-backups:/backups
      - ./scripts/backup-cron.sh:/backup.sh:ro
    entrypoint: /bin/sh
    command: >
      -c "chmod +x /backup.sh &&
          echo '0 2 * * * /backup.sh' | crontab - &&
          crond -f -l 2"
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  farmy-data:
    driver: local
  farmy-uploads:
    driver: local
  farmy-backups:
    driver: local
